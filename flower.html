<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ช่อดอกกุหลาบเบ่งบาน - Animated Rose Bouquet</title>
    <style>
        /* ==========================================================================
           1. CSS - จัดแต่งหน้าจอและโครงสร้างช่อดอกกุหลาบ
           ========================================================================== */
        
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a102f, #0b0617);
            overflow: hidden;
            font-family: sans-serif;
        }

        /* กล่องหลักสำหรับรวมช่อดอกกุหลาบ */
        .bouquet {
            position: relative;
            width: 300px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: flex-end; 
        }

        .flower-wrapper {
            position: absolute;
            bottom: 40px;
            display: flex;
            justify-content: center;
            transform-origin: bottom center;
            transform: rotate(var(--angle)) scale(var(--scale));
        }

        /* --- ก้านดอกไม้ --- */
        .stem {
            position: relative;
            width: 8px;
            height: 0; 
            background: linear-gradient(to top, #1a4a15, #357a26); /* สีเขียวเข้มขึ้นแบบก้านกุหลาบ */
            border-radius: 4px;
            animation: growStem 2s ease-out forwards;
            animation-delay: var(--delay);
        }

        /* --- หนามกุหลาบ --- */
        .thorn {
            position: absolute;
            width: 0;
            height: 0;
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
            opacity: 0;
            animation: fadeIn 1s forwards;
            animation-delay: calc(var(--delay) + 1s);
        }
        .thorn.left {
            left: -5px;
            top: 40%;
            border-right: 6px solid #235c1d;
            transform: rotate(20deg);
        }
        .thorn.right {
            right: -5px;
            top: 70%;
            border-left: 6px solid #235c1d;
            transform: rotate(-20deg);
        }

        /* --- ใบไม้ --- */
        .leaf {
            position: absolute;
            width: 35px;
            height: 20px;
            background: #357a26;
            border-radius: 0 20px 0 20px;
            opacity: 0;
            animation: fadeIn 1s forwards;
            animation-delay: calc(var(--delay) + 1.2s);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
        }
        .leaf.left {
            left: -30px;
            bottom: 50px; 
            transform: rotate(-15deg);
        }
        .leaf.right {
            right: -30px;
            bottom: 80px;
            transform: rotate(65deg) scaleX(-1);
        }

        /* --- กล่องรวมดอกกุหลาบ --- */
        .flower-head {
            position: absolute;
            top: 0; 
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 0px; 
            height: 0px;
            animation: bloom 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: calc(var(--delay) + 1.8s);
        }

        /* --- กลีบกุหลาบ --- */
        .petal {
            position: absolute;
            /* จัดให้มุมขวาล่างของกลีบมาอยู่ที่จุดศูนย์กลางพอดี */
            bottom: 0;
            right: 0;
            width: 45px;
            height: 45px;
            /* สีแดงกุหลาบ ไล่เฉดให้ดูมีมิติ */
            background: linear-gradient(135deg, #ff0040 0%, #90001a 100%);
            /* รูปร่างกลีบ: มน 3 มุม และแหลม 1 มุม (เพื่อใช้เป็นจุดหมุน) */
            border-radius: 50% 50% 0 50%;
            /* จุดหมุนอยู่ที่มุมขวาล่างที่แหลมๆ */
            transform-origin: 100% 100%;
            /* ใส่เงาให้แต่ละกลีบแยกชั้นกันชัดเจน */
            box-shadow: -2px 2px 6px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 100, 100, 0.2);
        }

        /* ==========================================================================
           KEYFRAMES (แอนิเมชัน)
           ========================================================================== */
        @keyframes growStem {
            0% { height: 0; }
            100% { height: var(--h); } 
        }

        @keyframes bloom {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-45deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(15deg); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0) rotate(var(--rot, 0deg)); }
            100% { opacity: 1; transform: scale(1) rotate(var(--rot, 0deg)); }
        }
    </style>
</head>
<body>

    <!-- ==========================================================================
       2. HTML - โครงสร้างช่อดอกไม้ (5 ดอก)
       ========================================================================== -->
    <div class="bouquet">
        
        <!-- ดอกซ้ายสุด -->
        <div class="flower-wrapper" style="--angle: -35deg; --scale: 0.7; --delay: 1.6s; --h: 150px;">
            <div class="stem">
                <div class="thorn left"></div>
                <div class="leaf left" style="--rot: -15deg;"></div>
                <div class="leaf right" style="--rot: 65deg;"></div>
                <div class="flower-head"></div>
            </div>
        </div>

        <!-- ดอกซ้าย -->
        <div class="flower-wrapper" style="--angle: -18deg; --scale: 0.85; --delay: 0.8s; --h: 190px;">
            <div class="stem">
                <div class="thorn right"></div>
                <div class="leaf left" style="--rot: -15deg;"></div>
                <div class="leaf right" style="--rot: 65deg;"></div>
                <div class="flower-head"></div>
            </div>
        </div>

        <!-- ดอกตรงกลาง -->
        <div class="flower-wrapper" style="--angle: 0deg; --scale: 1; --delay: 0s; --h: 230px;">
            <div class="stem">
                <div class="thorn left"></div>
                <div class="thorn right"></div>
                <div class="leaf left" style="--rot: -15deg;"></div>
                <div class="leaf right" style="--rot: 65deg;"></div>
                <div class="flower-head"></div>
            </div>
        </div>

        <!-- ดอกขวา -->
        <div class="flower-wrapper" style="--angle: 18deg; --scale: 0.85; --delay: 0.4s; --h: 200px;">
            <div class="stem">
                <div class="thorn left"></div>
                <div class="leaf left" style="--rot: -15deg;"></div>
                <div class="leaf right" style="--rot: 65deg;"></div>
                <div class="flower-head"></div>
            </div>
        </div>

        <!-- ดอกขวาสุด -->
        <div class="flower-wrapper" style="--angle: 35deg; --scale: 0.7; --delay: 1.2s; --h: 160px;">
            <div class="stem">
                <div class="thorn right"></div>
                <div class="leaf left" style="--rot: -15deg;"></div>
                <div class="leaf right" style="--rot: 65deg;"></div>
                <div class="flower-head"></div>
            </div>
        </div>

    </div>

    <!-- ==========================================================================
       3. JAVASCRIPT - สร้างกลีบกุหลาบเรียงเป็นเกลียว
       ========================================================================== -->
    <script>
        const flowerHeads = document.querySelectorAll('.flower-head');
        
        // กุหลาบ 1 ดอกใช้กลีบเยอะขึ้นเพื่อให้ดูหนา
        const totalPetals = 40; 

        flowerHeads.forEach(head => {
            for (let i = 0; i < totalPetals; i++) {
                const petal = document.createElement('div');
                petal.classList.add('petal');
                
                // ใช้องศาทองคำ (Golden Angle) 137.5 องศา ในการหมุนกลีบให้วนเป็นธรรมชาติ
                const angle = i * 137.5;
                
                // ยิ่งสร้างกลีบหลังๆ (อยู่ด้านบนสุด) ขนาดกลีบจะยิ่งเล็กลง เพื่อทำเป็นใจกลางดอก
                const scale = 1 - (i * 0.02);
                
                petal.style.transform = `rotate(${angle}deg) scale(${scale})`;
                
                head.appendChild(petal);
            }
        });
    </script>

</body>
</html>
